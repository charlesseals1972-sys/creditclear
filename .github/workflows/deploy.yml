name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches: [ "main" ]

# Required for GitHub to mint the OIDC token used for AssumeRoleWithWebIdentity
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production   # optional: pair with an Environment protection rule

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::725644096845:role/github-actions-deploy-role
          aws-region: us-east-1
          role-session-name: gha-deploy-${{ github.run_id }}

      - name: Verify assumed identity (optional sanity check)
        run: aws sts get-caller-identity

      - name: Sync build output to S3
        run: |
          aws s3 sync ./dist/public s3://creditclear-app \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id <CLOUDFRONT_DISTRIBUTION_ID> \
            --paths "/*"
